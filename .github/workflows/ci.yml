name: CI

on:
  pull_request:
    types: [opened, reopened, synchronize]
  push:
    branches:
      - main
      - master

permissions:
  contents: read

defaults:
  run:
    # https://docs.github.com/en/actions/using-workflows/workflow-syntax-for-github-actions#defaultsrun
    # https://linux.die.net/man/1/bash
    shell: bash --noprofile --norc -o errexit -o nounset -o pipefail -o xtrace -O nullglob -O dotglob {0}

jobs:
  changelog:
    name: Changelog
    runs-on: blacksmith-32vcpu-ubuntu-2404

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate change fragments
        run: node scripts/validate-changes.mjs

  cargo-test:
    name: Cargo Test
    runs-on: blacksmith-32vcpu-ubuntu-2404

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: set envs
        run: |
          grep -v "^#" << "EOF" >> $GITHUB_ENV
          CARGO_TERM_COLOR=always
          CARGO_INCREMENTAL=0
          # keep aligned with config.toml
          CARGO_PROFILE_DEV_DEBUG=0
          CARGO_PROFILE_TEST_DEBUG=0
          CARGO_PROFILE_RELEASE_DEBUG=0
          CARGO_PROFILE_BENCH_DEBUG=0
          CARGO_NET_RETRY=10
          RUSTUP_MAX_RETRIES=10
          NODE_ENV=production
          GIT_AUTHOR_NAME=github-actions[bot]
          GIT_COMMITTER_NAME=github-actions[bot]
          GIT_AUTHOR_EMAIL=41898282+github-actions[bot]@users.noreply.github.com
          GIT_COMMITTER_EMAIL=41898282+github-actions[bot]@users.noreply.github.com
          DEBIAN_FRONTEND=noninteractive
          BINSTALL_NO_CONFIRM=true
          EOF

      - name: Restore Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: ${{ github.job }}

      - name: cargo clippy
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

      - name: cargo test
        run: cargo test --workspace --all-features

  js-sdk-test:
    name: JS SDK Binding Test
    runs-on: blacksmith-32vcpu-ubuntu-2404

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Restore Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: ${{ github.job }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: packages/js-sdk/package-lock.json

      - name: Install JS SDK dependencies
        working-directory: packages/js-sdk
        run: npm install

      - name: Run JS SDK binding tests
        working-directory: packages/js-sdk
        run: npm test
