name: Release New Version

on:
  workflow_dispatch:
    inputs:
      version:
        description: Version to release, with or without a leading v
        required: true
        type: string
  push:
    branches:
      - main

permissions:
  actions: write
  contents: write

jobs:
  release:
    name: Create GitHub release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect release tag
        id: detect
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            tag="$(node scripts/release-tag.mjs "${{ inputs.version }}" | tail -n 1)"
          else
            tag="$(node scripts/release-tag.mjs | tail -n 1)"
          fi
          if [ -z "$tag" ] || [ "$tag" = "No release tag needed for this commit." ]; then
            echo "has_tag=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "has_tag=true" >> "$GITHUB_OUTPUT"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Create GitHub release
        if: steps.detect.outputs.has_tag == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="${{ steps.detect.outputs.tag }}"
          if gh release view "$tag" >/dev/null 2>&1; then
            echo "Release $tag already exists."
            exit 0
          fi
          gh release create "$tag" --target "$GITHUB_SHA" --title "$tag" --generate-notes
