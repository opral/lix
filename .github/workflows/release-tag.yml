name: Release New Version

on:
  workflow_dispatch:
    inputs:
      version:
        description: Version to release, with or without a leading v
        required: true
        type: string
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  tag:
    name: Create release tag
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect release tag
        id: detect
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            tag="$(node scripts/release-tag.mjs "${{ inputs.version }}" | tail -n 1)"
          else
            tag="$(node scripts/release-tag.mjs | tail -n 1)"
          fi
          if [ -z "$tag" ] || [ "$tag" = "No release tag needed for this commit." ]; then
            echo "has_tag=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "has_tag=true" >> "$GITHUB_OUTPUT"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Create and push tag
        if: steps.detect.outputs.has_tag == 'true'
        run: |
          tag="${{ steps.detect.outputs.tag }}"
          if git rev-parse "$tag" >/dev/null 2>&1; then
            echo "$tag already exists."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "$tag"
          git push origin "$tag"
