name: Release New Version

on:
  workflow_dispatch:
    inputs:
      version:
        description: Version to release and publish, with or without a leading v
        required: true
        type: string
  push:
    branches:
      - main

permissions:
  contents: write
  id-token: write

jobs:
  release-version:
    name: Validate release version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
      has_release: ${{ steps.version.outputs.has_release }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate release version
        id: version
        run: |
          set -o pipefail
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            tag="$(node scripts/release-tag.mjs "${{ inputs.version }}" | tail -n 1)"
          else
            tag="$(node scripts/release-tag.mjs | tail -n 1)"
          fi
          if [ -z "$tag" ] || [ "$tag" = "No release tag needed for this commit." ]; then
            echo "has_release=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          {
            echo "has_release=true"
            echo "tag=$tag"
            echo "version=${tag#v}"
          } >> "$GITHUB_OUTPUT"

  create-github-release:
    name: Create GitHub release
    runs-on: ubuntu-latest
    needs: release-version
    if: needs.release-version.outputs.has_release == 'true'

    steps:
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="${{ needs.release-version.outputs.tag }}"
          if gh release view "$tag" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "Release $tag already exists."
            exit 0
          fi
          gh release create "$tag" --repo "$GITHUB_REPOSITORY" --target "$GITHUB_SHA" --title "$tag" --generate-notes

  build-js-sdk-native-packages:
    name: Build @lix-js/sdk native package (${{ matrix.suffix }})
    runs-on: ${{ matrix.runner }}
    needs:
      - release-version
      - create-github-release
    if: needs.release-version.outputs.has_release == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - suffix: linux-x64
            runner: blacksmith-32vcpu-ubuntu-2404
          - suffix: linux-arm64
            runner: blacksmith-32vcpu-ubuntu-2404-arm
          - suffix: darwin-arm64
            runner: blacksmith-12vcpu-macos-15
          - suffix: win32-x64
            runner: blacksmith-16vcpu-windows-2025

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Restore Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: publish-js-sdk-${{ matrix.suffix }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: packages/js-sdk/package-lock.json

      - name: Install JS SDK dependencies
        working-directory: packages/js-sdk
        run: npm install

      - name: Build JS SDK native package
        working-directory: packages/js-sdk
        run: |
          npm run build:native
          npm run prepare:native-package -- --suffix=${{ matrix.suffix }}

      - name: Upload JS SDK native package
        uses: actions/upload-artifact@v4
        with:
          name: js-sdk-native-${{ matrix.suffix }}
          path: packages/js-sdk/native-packages/${{ matrix.suffix }}
          if-no-files-found: error

  publish-js-sdk-native-packages:
    name: Publish @lix-js/sdk native package (${{ matrix.suffix }})
    runs-on: ubuntu-latest
    needs: build-js-sdk-native-packages
    strategy:
      fail-fast: false
      matrix:
        suffix:
          - linux-x64
          - linux-arm64
          - darwin-arm64
          - win32-x64

    steps:
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Download JS SDK native package
        uses: actions/download-artifact@v4
        with:
          name: js-sdk-native-${{ matrix.suffix }}
          path: native-package

      - name: Publish JS SDK native package
        working-directory: native-package
        run: npm publish --provenance --access public

  build-js-sdk:
    name: Build @lix-js/sdk
    runs-on: blacksmith-32vcpu-ubuntu-2404
    needs:
      - release-version
      - create-github-release
    if: needs.release-version.outputs.has_release == 'true'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Restore Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: publish-js-sdk

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: packages/js-sdk/package-lock.json
          registry-url: https://registry.npmjs.org

      - name: Install JS SDK dependencies
        working-directory: packages/js-sdk
        run: npm install

      - name: Build JS SDK package
        working-directory: packages/js-sdk
        run: npm run build

      - name: Upload JS SDK package build
        uses: actions/upload-artifact@v4
        with:
          name: js-sdk-package-build
          path: |
            packages/js-sdk/dist
            packages/js-sdk/lix_js_sdk.node
          if-no-files-found: error

  test-js-sdk:
    name: Test @lix-js/sdk
    runs-on: blacksmith-32vcpu-ubuntu-2404
    needs: build-js-sdk

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: packages/js-sdk/package-lock.json

      - name: Install JS SDK dependencies
        working-directory: packages/js-sdk
        run: npm install

      - name: Download JS SDK package build
        uses: actions/download-artifact@v4
        with:
          name: js-sdk-package-build
          path: packages/js-sdk

      - name: Test JS SDK package
        working-directory: packages/js-sdk
        run: npx vitest run

  publish-js-sdk:
    name: Publish @lix-js/sdk
    runs-on: ubuntu-latest
    needs:
      - publish-js-sdk-native-packages
      - test-js-sdk

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: packages/js-sdk/package-lock.json
          registry-url: https://registry.npmjs.org

      - name: Install JS SDK dependencies
        working-directory: packages/js-sdk
        run: npm install

      - name: Download JS SDK package build
        uses: actions/download-artifact@v4
        with:
          name: js-sdk-package-build
          path: packages/js-sdk

      - name: Publish JS SDK package
        working-directory: packages/js-sdk
        run: npm publish --provenance --access public

  publish-status:
    name: Publish status
    runs-on: ubuntu-latest
    needs:
      - release-version
      - create-github-release
      - build-js-sdk-native-packages
      - publish-js-sdk-native-packages
      - build-js-sdk
      - test-js-sdk
      - publish-js-sdk
    if: ${{ always() }}

    steps:
      - name: Fail if any publish job failed
        run: |
          echo "release-version: ${{ needs.release-version.result }}"
          echo "create-github-release: ${{ needs.create-github-release.result }}"
          echo "build-js-sdk-native-packages: ${{ needs.build-js-sdk-native-packages.result }}"
          echo "publish-js-sdk-native-packages: ${{ needs.publish-js-sdk-native-packages.result }}"
          echo "build-js-sdk: ${{ needs.build-js-sdk.result }}"
          echo "test-js-sdk: ${{ needs.test-js-sdk.result }}"
          echo "publish-js-sdk: ${{ needs.publish-js-sdk.result }}"

          if [ "${{ needs.release-version.outputs.has_release }}" != "true" ]; then
            echo "No release needed for this commit."
            exit 0
          fi

          if [ "${{ contains(needs.*.result, 'failure') }}" = "true" ]; then
            exit 1
          fi
          if [ "${{ contains(needs.*.result, 'cancelled') }}" = "true" ]; then
            exit 1
          fi
          if [ "${{ contains(needs.*.result, 'skipped') }}" = "true" ]; then
            exit 1
          fi
