name: Publish Packages

on:
  workflow_dispatch:
    inputs:
      version:
        description: Version to publish, with or without a leading v
        required: true
        type: string
  release:
    types: [published]

permissions:
  contents: read
  id-token: write

jobs:
  release-version:
    name: Validate release version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate release version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            version="${{ inputs.version }}"
          else
            version="${{ github.event.release.tag_name }}"
          fi
          version="${version#v}"
          tag="$(node scripts/release-tag.mjs "$version" | tail -n 1)"
          echo "version=${tag#v}" >> "$GITHUB_OUTPUT"

  build-js-sdk-native-packages:
    name: Build @lix-js/sdk native package (${{ matrix.suffix }})
    runs-on: ${{ matrix.runner }}
    needs: release-version
    strategy:
      fail-fast: false
      matrix:
        include:
          - suffix: linux-x64
            runner: blacksmith-32vcpu-ubuntu-2404
          - suffix: linux-arm64
            runner: blacksmith-32vcpu-ubuntu-2404-arm
          - suffix: darwin-arm64
            runner: blacksmith-12vcpu-macos-15
          - suffix: win32-x64
            runner: blacksmith-16vcpu-windows-2025

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Restore Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: publish-js-sdk-${{ matrix.suffix }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: packages/js-sdk/package-lock.json

      - name: Install JS SDK dependencies
        working-directory: packages/js-sdk
        run: npm install

      - name: Build JS SDK native package
        working-directory: packages/js-sdk
        run: |
          npm run build:native
          npm run prepare:native-package -- --suffix=${{ matrix.suffix }}

      - name: Upload JS SDK native package
        uses: actions/upload-artifact@v4
        with:
          name: js-sdk-native-${{ matrix.suffix }}
          path: packages/js-sdk/native-packages/${{ matrix.suffix }}
          if-no-files-found: error

  publish-js-sdk-native-packages:
    name: Publish @lix-js/sdk native package (${{ matrix.suffix }})
    runs-on: ubuntu-latest
    needs: build-js-sdk-native-packages
    strategy:
      fail-fast: false
      matrix:
        suffix:
          - linux-x64
          - linux-arm64
          - darwin-arm64
          - win32-x64

    steps:
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Download JS SDK native package
        uses: actions/download-artifact@v4
        with:
          name: js-sdk-native-${{ matrix.suffix }}
          path: native-package

      - name: Publish JS SDK native package
        working-directory: native-package
        run: npm publish --provenance --access public

  publish-js-sdk:
    name: Publish @lix-js/sdk
    runs-on: ubuntu-latest
    needs: publish-js-sdk-native-packages

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Restore Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: publish-js-sdk

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: packages/js-sdk/package-lock.json
          registry-url: https://registry.npmjs.org

      - name: Install JS SDK dependencies
        working-directory: packages/js-sdk
        run: npm install

      - name: Test JS SDK package
        working-directory: packages/js-sdk
        run: npm test

      - name: Publish JS SDK package
        working-directory: packages/js-sdk
        run: npm publish --provenance --access public

  publish-status:
    name: Publish status
    runs-on: ubuntu-latest
    needs:
      - release-version
      - build-js-sdk-native-packages
      - publish-js-sdk-native-packages
      - publish-js-sdk
    if: ${{ always() }}

    steps:
      - name: Fail if any publish job failed
        run: |
          echo "release-version: ${{ needs.release-version.result }}"
          echo "build-js-sdk-native-packages: ${{ needs.build-js-sdk-native-packages.result }}"
          echo "publish-js-sdk-native-packages: ${{ needs.publish-js-sdk-native-packages.result }}"
          echo "publish-js-sdk: ${{ needs.publish-js-sdk.result }}"

          if [ "${{ contains(needs.*.result, 'failure') }}" = "true" ]; then
            exit 1
          fi
          if [ "${{ contains(needs.*.result, 'cancelled') }}" = "true" ]; then
            exit 1
          fi
          if [ "${{ contains(needs.*.result, 'skipped') }}" = "true" ]; then
            exit 1
          fi
