name: Release New Version

on:
  workflow_dispatch:
    inputs:
      version:
        description: Version to release and publish, without a leading v
        required: true
        type: string
  push:
    branches:
      - main

concurrency:
  group: release-packages-${{ github.event_name == 'workflow_dispatch' && inputs.version || github.sha }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  release-version:
    name: Validate release version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
      release_sha: ${{ steps.version.outputs.release_sha }}
      has_release: ${{ steps.version.outputs.has_release }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Validate release version
        id: version
        env:
          MANUAL_VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail
          release_sha="$GITHUB_SHA"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            if [[ "$MANUAL_VERSION" == v* ]]; then
              echo "Manual release version must not include a leading v." >&2
              exit 1
            fi
            tag="$(node scripts/release-tag.mjs "$MANUAL_VERSION" | tail -n 1)"
          else
            tag="$(node scripts/release-tag.mjs | tail -n 1)"
          fi
          if [ -z "$tag" ] || [ "$tag" = "No release tag needed for this commit." ]; then
            echo "has_release=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if ! git merge-base --is-ancestor "$release_sha" origin/main; then
            echo "Release source $release_sha is not reachable from origin/main." >&2
            exit 1
          fi

          existing_tag_sha="$(git rev-parse --verify --quiet "refs/tags/${tag}^{commit}" || true)"
          if [ -n "$existing_tag_sha" ] && [ "$existing_tag_sha" != "$release_sha" ]; then
            echo "$tag already points to $existing_tag_sha, not release source $release_sha." >&2
            exit 1
          fi

          {
            echo "has_release=true"
            echo "tag=$tag"
            echo "version=${tag#v}"
            echo "release_sha=$release_sha"
          } >> "$GITHUB_OUTPUT"

  build-js-sdk-native-packages:
    name: Build @lix-js/sdk native package (${{ matrix.suffix }})
    runs-on: ${{ matrix.runner }}
    needs: release-version
    if: needs.release-version.outputs.has_release == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - suffix: linux-x64
            runner: blacksmith-32vcpu-ubuntu-2404
          - suffix: linux-arm64
            runner: blacksmith-32vcpu-ubuntu-2404-arm
          - suffix: darwin-arm64
            runner: blacksmith-12vcpu-macos-15
          - suffix: win32-x64
            runner: blacksmith-16vcpu-windows-2025

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.release-version.outputs.release_sha }}

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install LLVM build dependencies
        if: startsWith(matrix.suffix, 'linux-')
        run: |
          sudo apt-get update
          sudo apt-get install -y llvm-dev libclang-dev clang

      - name: Install LLVM build dependencies (Windows)
        if: matrix.suffix == 'win32-x64'
        shell: pwsh
        run: |
          choco install llvm --no-progress -y
          "LIBCLANG_PATH=C:\Program Files\LLVM\bin" |
            Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Restore Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: publish-js-sdk-${{ matrix.suffix }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: packages/js-sdk/package-lock.json

      - name: Install JS SDK dependencies
        working-directory: packages/js-sdk
        run: npm install

      - name: Build JS SDK native binary
        working-directory: packages/js-sdk
        run: npm run build:native

      - name: Prepare JS SDK native package
        working-directory: packages/js-sdk
        run: npm run prepare:native-package -- --suffix=${{ matrix.suffix }}

      - name: Upload JS SDK native package
        uses: actions/upload-artifact@v4
        with:
          name: js-sdk-native-${{ matrix.suffix }}
          path: packages/js-sdk/native-packages/${{ matrix.suffix }}
          if-no-files-found: error

  build-js-sdk:
    name: Build @lix-js/sdk
    runs-on: blacksmith-32vcpu-ubuntu-2404
    needs: release-version
    if: needs.release-version.outputs.has_release == 'true'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.release-version.outputs.release_sha }}

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install LLVM build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y llvm-dev libclang-dev clang

      - name: Restore Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: publish-js-sdk

      - name: Install WebAssembly build target
        run: rustup target add wasm32-unknown-unknown

      - name: Install wasm-bindgen CLI
        uses: taiki-e/install-action@v2
        with:
          tool: wasm-bindgen-cli@0.2.122

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: packages/js-sdk/package-lock.json
          registry-url: https://registry.npmjs.org

      - name: Install JS SDK dependencies
        working-directory: packages/js-sdk
        run: npm install

      - name: Build JS SDK package
        working-directory: packages/js-sdk
        run: npm run build

      - name: Upload JS SDK package build
        uses: actions/upload-artifact@v4
        with:
          name: js-sdk-package-build
          path: |
            packages/js-sdk/dist
            packages/js-sdk/lix_js_sdk.node
          if-no-files-found: error

  test-js-sdk:
    name: Test @lix-js/sdk
    runs-on: blacksmith-32vcpu-ubuntu-2404
    needs:
      - release-version
      - build-js-sdk

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.release-version.outputs.release_sha }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: packages/js-sdk/package-lock.json

      - name: Install JS SDK dependencies
        working-directory: packages/js-sdk
        run: npm install

      - name: Download JS SDK package build
        uses: actions/download-artifact@v4
        with:
          name: js-sdk-package-build
          path: packages/js-sdk

      - name: Test JS SDK package
        working-directory: packages/js-sdk
        run: npx vitest run

  publish-js-sdk:
    name: Publish @lix-js/sdk packages
    runs-on: ubuntu-latest
    needs:
      - release-version
      - build-js-sdk-native-packages
      - test-js-sdk
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false
          ref: ${{ needs.release-version.outputs.release_sha }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: packages/js-sdk/package-lock.json
          registry-url: https://registry.npmjs.org

      - name: Download JS SDK native packages
        uses: actions/download-artifact@v4
        with:
          pattern: js-sdk-native-*
          path: native-packages

      - name: Download JS SDK package build
        uses: actions/download-artifact@v4
        with:
          name: js-sdk-package-build
          path: packages/js-sdk

      - name: Publish JS SDK packages
        env:
          EXPECTED_VERSION: ${{ needs.release-version.outputs.version }}
        run: |
          set -euo pipefail
          publish_package() {
            local package_dir="$1"
            local package_json="$package_dir/package.json"
            local package_name
            local package_version
            local package_spec
            local pack_json
            local pack_key
            local pack_dir
            local pack_path
            local local_integrity
            local remote_integrity
            local registry_error

            package_name="$(node -p 'require(process.argv[1]).name' "$package_json")"
            package_version="$(node -p 'require(process.argv[1]).version' "$package_json")"
            package_spec="${package_name}@${package_version}"

            if [ "$package_version" != "$EXPECTED_VERSION" ]; then
              echo "$package_spec does not match release version $EXPECTED_VERSION." >&2
              return 1
            fi

            pack_key="${package_name#@}"
            pack_key="${pack_key//\//-}"
            pack_dir="$RUNNER_TEMP/$pack_key"
            mkdir -p "$pack_dir"
            pack_json="$(cd "$package_dir" && npm pack --json --ignore-scripts --pack-destination "$pack_dir")"
            pack_path="$(find "$pack_dir" -maxdepth 1 -type f -name '*.tgz' -print -quit)"
            if [ -z "$pack_path" ]; then
              echo "npm pack did not create a tarball for $package_spec." >&2
              return 1
            fi
            local_integrity="$(node -e 'console.log(JSON.parse(process.argv[1])[0].integrity)' "$pack_json")"
            registry_error="$RUNNER_TEMP/npm-view-error.log"

            if remote_integrity="$(npm view "$package_spec" dist.integrity 2>"$registry_error")"; then
              if [ "$remote_integrity" != "$local_integrity" ]; then
                echo "$package_spec exists with different contents." >&2
                echo "registry: $remote_integrity" >&2
                echo "local:    $local_integrity" >&2
                return 1
              fi
              echo "$package_spec is already published with identical contents."
              return 0
            fi

            if ! grep -q 'E404' "$registry_error"; then
              cat "$registry_error" >&2
              return 1
            fi

            npm publish "$pack_path" --provenance --access public
          }

          for suffix in linux-x64 linux-arm64 darwin-arm64 win32-x64; do
            package_dir="$GITHUB_WORKSPACE/native-packages/js-sdk-native-$suffix"
            if [ ! -f "$package_dir/package.json" ]; then
              echo "Missing native package artifact for $suffix." >&2
              exit 1
            fi
            publish_package "$package_dir"
          done

          publish_package "$GITHUB_WORKSPACE/packages/js-sdk"

  create-github-release:
    name: Create GitHub release
    runs-on: ubuntu-latest
    needs:
      - release-version
      - publish-js-sdk
    permissions:
      contents: write

    steps:
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ needs.release-version.outputs.tag }}
          RELEASE_SHA: ${{ needs.release-version.outputs.release_sha }}
        run: |
          set -euo pipefail
          tag_lookup_error="$RUNNER_TEMP/tag-lookup-error.log"
          if existing_tag_sha="$(gh api "repos/$GITHUB_REPOSITORY/commits/$RELEASE_TAG" --jq .sha 2>"$tag_lookup_error")"; then
            tag_exists=true
          elif grep -Eq 'HTTP (404|422)' "$tag_lookup_error"; then
            tag_exists=false
            existing_tag_sha=""
          else
            cat "$tag_lookup_error" >&2
            exit 1
          fi

          if [ "$tag_exists" = true ] && [ "$existing_tag_sha" != "$RELEASE_SHA" ]; then
            echo "$RELEASE_TAG points to $existing_tag_sha, not release source $RELEASE_SHA." >&2
            exit 1
          fi

          if gh release view "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            if [ "$tag_exists" != true ]; then
              echo "Release $RELEASE_TAG exists without a resolvable tag." >&2
              exit 1
            fi
            echo "Release $RELEASE_TAG already exists."
            exit 0
          fi

          if [ "$tag_exists" != true ]; then
            create_tag_error="$RUNNER_TEMP/create-tag-error.log"
            if ! gh api --method POST "repos/$GITHUB_REPOSITORY/git/refs" \
              -f ref="refs/tags/$RELEASE_TAG" \
              -f sha="$RELEASE_SHA" \
              >/dev/null 2>"$create_tag_error"; then
              if ! grep -q 'HTTP 422' "$create_tag_error"; then
                cat "$create_tag_error" >&2
                exit 1
              fi

              existing_tag_sha="$(gh api "repos/$GITHUB_REPOSITORY/commits/$RELEASE_TAG" --jq .sha)"
              if [ "$existing_tag_sha" != "$RELEASE_SHA" ]; then
                echo "$RELEASE_TAG was concurrently created at $existing_tag_sha, not release source $RELEASE_SHA." >&2
                exit 1
              fi
            fi
          fi

          gh release create "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" --target "$RELEASE_SHA" --title "$RELEASE_TAG" --generate-notes

          created_tag_sha="$(gh api "repos/$GITHUB_REPOSITORY/commits/$RELEASE_TAG" --jq .sha)"
          if [ "$created_tag_sha" != "$RELEASE_SHA" ]; then
            echo "$RELEASE_TAG was created at $created_tag_sha, not release source $RELEASE_SHA." >&2
            exit 1
          fi

  publish-status:
    name: Publish status
    runs-on: ubuntu-latest
    needs:
      - release-version
      - create-github-release
      - build-js-sdk-native-packages
      - build-js-sdk
      - test-js-sdk
      - publish-js-sdk
    if: ${{ always() }}

    steps:
      - name: Fail if any publish job failed
        run: |
          echo "release-version: ${{ needs.release-version.result }}"
          echo "create-github-release: ${{ needs.create-github-release.result }}"
          echo "build-js-sdk-native-packages: ${{ needs.build-js-sdk-native-packages.result }}"
          echo "build-js-sdk: ${{ needs.build-js-sdk.result }}"
          echo "test-js-sdk: ${{ needs.test-js-sdk.result }}"
          echo "publish-js-sdk: ${{ needs.publish-js-sdk.result }}"

          if [ "${{ needs.release-version.result }}" != "success" ]; then
            exit 1
          fi

          if [ "${{ needs.release-version.outputs.has_release }}" != "true" ]; then
            echo "No release needed for this commit."
            exit 0
          fi

          if [ "${{ contains(needs.*.result, 'failure') }}" = "true" ]; then
            exit 1
          fi
          if [ "${{ contains(needs.*.result, 'cancelled') }}" = "true" ]; then
            exit 1
          fi
          if [ "${{ contains(needs.*.result, 'skipped') }}" = "true" ]; then
            exit 1
          fi
