name: Cargo Test

on:
  pull_request:
    types: [opened, reopened, synchronize]
  push:
    branches:
      - main
      - master

permissions:
  contents: read

jobs:
  cargo-test:
    name: cargo test --workspace
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run cargo tests
        run: cargo test --workspace
