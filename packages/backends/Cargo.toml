[package]
name = "lix_backends"
version.workspace = true
authors.workspace = true
edition.workspace = true
description.workspace = true
license.workspace = true
homepage.workspace = true
repository.workspace = true
documentation.workspace = true
readme.workspace = true
keywords.workspace = true
categories.workspace = true
rust-version.workspace = true

[lints]
workspace = true

[features]
default = []
redb = ["dep:bytes", "dep:redb", "dep:tempfile"]
rocksdb = ["dep:bytes", "dep:rocksdb", "dep:tempfile"]
slatedb = ["dep:bytes", "dep:object_store", "dep:slatedb", "dep:tempfile", "dep:tokio"]
sqlite = ["dep:rusqlite", "dep:tempfile"]

[dependencies]
lix_engine = { workspace = true }

bytes = { version = "1", optional = true }
object_store = { version = "0.14", default-features = false, features = ["fs"], optional = true }
redb = { version = "4.1.0", optional = true }
rocksdb = { version = "0.24", default-features = false, features = ["bindgen-runtime"], optional = true }
rusqlite = { version = "0.32", features = ["bundled"], optional = true }
slatedb = { version = "0.14.1", default-features = false, optional = true }
tempfile = { version = "3", optional = true }
tokio = { version = "1", features = ["rt"], optional = true }
