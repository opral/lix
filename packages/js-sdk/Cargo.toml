[package]
name = "lix_js_sdk"
version.workspace = true
authors.workspace = true
edition.workspace = true
description.workspace = true
license.workspace = true
homepage.workspace = true
repository.workspace = true
documentation.workspace = true
readme.workspace = true
keywords.workspace = true
categories.workspace = true
rust-version.workspace = true

[lints]
workspace = true

[lib]
crate-type = ["cdylib"]
path = "native/lib.rs"

[dependencies]
async-trait = "0.1"
serde = { version = "1", features = ["derive"] }
serde_json = "1"

[target.'cfg(not(target_family = "wasm"))'.dependencies]
lix_sdk = { path = "../rs-sdk", version = "0.8.4", default-features = false, features = ["local_filesystem", "sqlite"] }
napi = { version = "3.9.0", default-features = false, features = ["napi6", "serde-json"] }
napi-derive = "3.5.6"
tokio = { version = "1", features = ["rt", "sync"] }

[target.'cfg(target_family = "wasm")'.dependencies]
lix_sdk = { path = "../rs-sdk", version = "0.8.4", default-features = false }
console_error_panic_hook = "0.1"
futures-util = { version = "0.3", default-features = false, features = ["std"] }
getrandom = { version = "0.3", features = ["wasm_js"] }
js-sys = "0.3"
serde-wasm-bindgen = "0.6"
serde_bytes = "0.11"
wasm-bindgen = "0.2"
wasm-bindgen-futures = "0.4"
