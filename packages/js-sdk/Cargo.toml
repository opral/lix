[package]
name = "lix_engine_wasm_bindgen"
version = "0.1.0"
edition = "2021"

[lib]
path = "wasm-bindgen.rs"
crate-type = ["cdylib"]

[dependencies]
lix_rs_sdk = { path = "../rs-sdk" }
wasm-bindgen = "0.2"
wasm-bindgen-futures = "0.4"
js-sys = "0.3"
async-trait = "0.1"
getrandom = { version = "0.3", features = ["wasm_js"] }
serde = "1"
serde_json = "1"
serde-wasm-bindgen = "0.6"
base64 = "0.22"
bytes = "1"
