[package]
name = "lix_js_sdk"
version.workspace = true
edition = "2021"

[lib]
crate-type = ["cdylib"]
path = "native/lib.rs"

[dependencies]
lix_sdk = { workspace = true, features = ["sqlite"] }

napi = { version = "3.9.0", default-features = false, features = ["napi6", "serde-json"] }
napi-derive = "3.5.6"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio = { version = "1", features = ["rt"] }
