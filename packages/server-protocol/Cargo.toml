[package]
name = "lix_server_protocol"
version.workspace = true
authors.workspace = true
edition.workspace = true
description = "Canonical HTTP server protocol for independent Lix sessions."
license.workspace = true
homepage.workspace = true
repository.workspace = true
documentation.workspace = true
readme = "README.md"
keywords.workspace = true
categories.workspace = true
rust-version.workspace = true

[lints]
workspace = true

[dependencies]
async-stream = "0.3"
axum = "0.8"
futures-core = "0.3"
getrandom = "0.3"
lix_sdk = { path = "../rs-sdk", version = "0.8.4", default-features = false }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
sha2 = "0.10"
tokio = { version = "1", features = ["sync", "rt"] }
tower-http = { version = "0.6", features = ["compression-gzip", "decompression-gzip"] }
tracing = "0.1"

[dev-dependencies]
flate2 = "1"
http-body-util = "0.1"
tower = { version = "0.5", features = ["util"] }
tokio = { version = "1", features = ["macros", "rt-multi-thread"] }
tracing-subscriber = "0.3"
