[package]
name = "lix_sdk"
version.workspace = true
authors.workspace = true
edition.workspace = true
description.workspace = true
license.workspace = true
homepage.workspace = true
repository.workspace = true
documentation.workspace = true
readme.workspace = true
keywords.workspace = true
categories.workspace = true
rust-version.workspace = true

[lints]
workspace = true

[dependencies]
lix_engine = { workspace = true }

async-trait = "0.1"
bytes = "1"
rusqlite = { version = "0.32", features = ["bundled"], optional = true }
tempfile = { version = "3", optional = true }

[dev-dependencies]
plugin_csv_wasm = { package = "plugin_csv", path = "../../plugins/csv", artifact = "cdylib", target = "wasm32-wasip2", lib = false }

criterion = { package = "codspeed-criterion-compat", version = "4" }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio = { version = "1", features = ["rt", "macros"] }
wasmtime = { version = "30.0.2", default-features = false, features = ["component-model", "cranelift", "runtime", "std"] }
wasmtime-wasi = { version = "30.0.2", default-features = false }
zip = { version = "8", default-features = false }

[features]
default = []
sqlite = ["dep:rusqlite", "dep:tempfile"]

[[example]]
name = "create_sqlite_fixture"
path = "tests/fixtures/create_sqlite_fixture.rs"
required-features = ["sqlite"]

[[example]]
name = "write_sqlite_key_value"
path = "tests/fixtures/write_sqlite_key_value.rs"
required-features = ["sqlite"]

[[example]]
name = "verify_sqlite_key_value"
path = "tests/fixtures/verify_sqlite_key_value.rs"
required-features = ["sqlite"]

[[bench]]
name = "sqlite_backend"
path = "benches/sqlite_backend.rs"
harness = false
required-features = ["sqlite"]
