[package]
name = "lix_sdk"
version.workspace = true
authors.workspace = true
edition.workspace = true
description.workspace = true
license.workspace = true
homepage.workspace = true
repository.workspace = true
documentation.workspace = true
readme.workspace = true
keywords.workspace = true
categories.workspace = true
rust-version.workspace = true

[lints]
workspace = true

[dependencies]
lix_engine = { workspace = true }
lix_local_filesystem = { workspace = true, optional = true }
lix_sqlite_storage = { workspace = true, optional = true }

async-trait = "0.1"
blake3 = { version = "1", optional = true }
bytes = "1"
lru = { version = "0.18", optional = true }
rusqlite = { version = "0.32", features = ["bundled"], optional = true }
tempfile = { version = "3", optional = true }
wasmtime = { version = "45", default-features = false, features = ["component-model", "cranelift", "runtime", "std"], optional = true }
wasmtime-wasi = { version = "45", default-features = false, features = ["p2"], optional = true }

[target.'cfg(not(target_family = "wasm"))'.dependencies]
notify-debouncer-full = { version = "0.7.0", default-features = false, features = ["macos_kqueue"] }
tokio = { version = "1", features = ["rt", "sync"] }

[dev-dependencies]
lix_rocksdb_storage.workspace = true
lix_slatedb_storage.workspace = true
object_store = { version = "0.14", default-features = false, features = ["fs"] }
plugin_csv = { path = "../../plugins/csv", lib = true, artifact = "cdylib", target = "wasm32-wasip2" }
plugin_csv_v2 = { path = "../../plugins/csv-v2", lib = true, artifact = "cdylib", target = "wasm32-wasip2" }
plugin_json_v2 = { path = "../../plugins/json", lib = true, artifact = "cdylib", target = "wasm32-wasip2" }
plugin_json_incremental_v2 = { package = "plugin_json_incremental_v2", path = "../../plugins/json-v2", lib = true, artifact = "cdylib", target = "wasm32-wasip2" }
criterion = { package = "codspeed-criterion-compat", version = "4" }
serde_json = "1"
sha2 = "0.10"
tempfile = "3"
tokio = { version = "1", features = ["rt", "macros"] }
wasm-encoder = "0.248"
zip = { version = "8", default-features = false }

[features]
default = ["default_wasm_runtime"]
default_wasm_runtime = ["dep:blake3", "dep:lru", "dep:wasmtime", "dep:wasmtime-wasi"]
local_filesystem = ["dep:lix_local_filesystem", "lix_local_filesystem/rocksdb"]
__profile_wasm_memory = []
sqlite = ["dep:lix_sqlite_storage", "dep:rusqlite", "dep:tempfile"]

[[example]]
name = "create_sqlite_fixture"
path = "tests/fixtures/create_sqlite_fixture.rs"
required-features = ["sqlite"]

[[example]]
name = "write_sqlite_key_value"
path = "tests/fixtures/write_sqlite_key_value.rs"
required-features = ["sqlite"]

[[example]]
name = "verify_sqlite_key_value"
path = "tests/fixtures/verify_sqlite_key_value.rs"
required-features = ["sqlite"]

[[bench]]
name = "profile_merge_10k"
path = "benches/profile_merge_10k.rs"
harness = false
required-features = ["sqlite"]

[[bench]]
name = "profile_plugin_large_file"
path = "benches/profile_plugin_large_file.rs"
harness = false
required-features = ["default_wasm_runtime", "local_filesystem", "__profile_wasm_memory"]

[[test]]
name = "profile_plugin_large_file_fixture"
path = "benches/profile_plugin_large_file.rs"
required-features = ["default_wasm_runtime", "local_filesystem", "__profile_wasm_memory"]

[[example]]
name = "profile_fs_open"
path = "examples/profile_fs_open.rs"
required-features = ["local_filesystem"]

[[bench]]
name = "sqlite"
path = "benches/sqlite.rs"
harness = false
required-features = ["sqlite"]
