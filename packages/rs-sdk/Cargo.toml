[package]
name = "lix_sdk"
version.workspace = true
authors.workspace = true
edition.workspace = true
description.workspace = true
license.workspace = true
homepage.workspace = true
repository.workspace = true
documentation.workspace = true
readme.workspace = true
keywords.workspace = true
categories.workspace = true
rust-version.workspace = true

[lints]
workspace = true

[dependencies]
lix_backends = { workspace = true, optional = true }
lix_engine = { workspace = true }
lix_fs_backend = { workspace = true, optional = true }

async-trait = "0.1"
bytes = "1"
rusqlite = { version = "0.32", features = ["bundled"], optional = true }
tempfile = { version = "3", optional = true }
wasmtime = { version = "45", default-features = false, features = ["component-model", "cranelift", "runtime", "std"], optional = true }
wasmtime-wasi = { version = "45", default-features = false, features = ["p2"], optional = true }

[target.'cfg(not(target_family = "wasm"))'.dependencies]
notify-debouncer-full = { version = "0.7.0", default-features = false, features = ["macos_kqueue"] }
tokio = { version = "1", features = ["rt", "sync"] }

[dev-dependencies]
criterion = { package = "codspeed-criterion-compat", version = "4" }
tempfile = "3"
tokio = { version = "1", features = ["rt", "macros"] }
zip = { version = "8", default-features = false }

[features]
default = ["default_wasm_runtime"]
default_wasm_runtime = ["dep:wasmtime", "dep:wasmtime-wasi"]
fs_backend = ["dep:lix_fs_backend", "lix_fs_backend/rocksdb"]
sqlite = ["dep:lix_backends", "lix_backends/sqlite", "dep:rusqlite", "dep:tempfile"]

[[example]]
name = "create_sqlite_fixture"
path = "tests/fixtures/create_sqlite_fixture.rs"
required-features = ["sqlite"]

[[example]]
name = "write_sqlite_key_value"
path = "tests/fixtures/write_sqlite_key_value.rs"
required-features = ["sqlite"]

[[example]]
name = "verify_sqlite_key_value"
path = "tests/fixtures/verify_sqlite_key_value.rs"
required-features = ["sqlite"]

[[bench]]
name = "profile_merge_10k"
path = "benches/profile_merge_10k.rs"
harness = false
required-features = ["sqlite"]

[[example]]
name = "profile_fs_open"
path = "examples/profile_fs_open.rs"
required-features = ["fs_backend"]

[[example]]
name = "profile_fs_open_in_place"
path = "examples/profile_fs_open_in_place.rs"
required-features = ["sqlite"]

[[bench]]
name = "sqlite_backend"
path = "benches/sqlite_backend.rs"
harness = false
required-features = ["sqlite"]
