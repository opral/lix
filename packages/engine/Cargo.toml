[package]
name = "lix_engine"
version = "0.1.0"
edition = "2021"
autobenches = false

[features]
storage-benches = []

[[bench]]
name = "storage_v2"
path = "benches/storage_v2.rs"
harness = false
required-features = ["storage-benches"]

[dependencies]
ahash = "0.8"
async-trait = "0.1"
cel = { version = "0.12.0", features = ["json"] }
chrono = { version = "0.4", default-features = false, features = ["clock", "std", "wasmbind"] }
datafusion = { version = "53.0.0", default-features = false, features = [
    "sql",
    "nested_expressions",
    "datetime_expressions",
    "regex_expressions",
    "string_expressions",
    "unicode_expressions",
] }
flatbuffers = "=25.12.19"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
jsonschema = { version = "0.17", default-features = false, features = ["draft202012"] }
globset = "0.4"
uuid = { version = "1", features = ["v7", "std", "js"] }
unicode-normalization = "0.1"
precis-profiles = "0.1.13"
futures-util = { version = "0.3", default-features = false, features = ["std"] }
tokio = { version = "1", features = ["rt"] }
blake3 = "1"
fastcdc = "3"
xxhash-rust = { version = "0.8", features = ["xxh3"] }
base64 = "0.22"
bytes = "1"

[dev-dependencies]
criterion = { package = "codspeed-criterion-compat", version = "*" }
iref = "4.0.0"
paste = "1"
rocksdb = { version = "0.22", default-features = false }
redb = "4.1.0"
rustc-hash = "2"
rusqlite = { version = "0.32", features = ["bundled"] }
tempfile = "3"
tokio = { version = "1", features = ["rt", "macros", "sync"] }

[target.'cfg(not(target_arch = "wasm32"))'.dependencies]
zstd = "0.13"

[target.'cfg(target_arch = "wasm32")'.dependencies]
ruzstd = { version = "0.8", default-features = false, features = ["std"] }
