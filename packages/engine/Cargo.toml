[package]
name = "lix_engine"
version.workspace = true
authors.workspace = true
edition.workspace = true
description.workspace = true
license.workspace = true
homepage.workspace = true
repository.workspace = true
documentation.workspace = true
readme.workspace = true
keywords.workspace = true
categories.workspace = true
rust-version.workspace = true
autobenches = false

[lints]
workspace = true

[features]
rocksdb = []
slatedb = []
storage-benches = ["rocksdb"]

[[bench]]
name = "storage_v2"
path = "benches/storage_v2.rs"
harness = false
required-features = ["storage-benches"]

[[bench]]
name = "changelog_scorecard"
path = "benches/changelog/scorecard.rs"
harness = false
required-features = ["storage-benches"]

[[bench]]
name = "changelog_cpu_profile"
path = "benches/changelog/profile_cpu.rs"
harness = false
required-features = ["storage-benches"]

[[bench]]
name = "changelog_direct_profile"
path = "benches/changelog/profile_direct.rs"
harness = false
required-features = ["storage-benches"]

[[bench]]
name = "untracked_state_crud"
path = "benches/untracked_state_crud/main.rs"
harness = false
required-features = ["storage-benches"]

[[bench]]
name = "tracked_state_crud"
path = "benches/tracked_state_crud/main.rs"
harness = false
required-features = ["storage-benches"]

[[bench]]
name = "slatedb_file_api"
path = "benches/slatedb_file_api.rs"
harness = false
required-features = ["slatedb"]

[dependencies]
ahash = "0.8"
async-trait = "0.1"
cel = { version = "0.12.0", features = ["json"] }
chrono = { version = "0.4", default-features = false, features = ["clock", "std", "wasmbind"] }
datafusion = { version = "53.0.0", default-features = false, features = [
    "sql",
    "nested_expressions",
    "datetime_expressions",
    "regex_expressions",
    "string_expressions",
    "unicode_expressions",
] }
musli = { version = "0.0.149", features = ["storage"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
jsonschema = { version = "0.17", default-features = false, features = ["draft202012"] }
globset = "0.4"
jiff = { version = "0.2.27", default-features = false, features = ["std"] }
lru = "0.18"
memchr = "2"
uuid = { version = "1", features = ["v7", "std", "js", "fast-rng"] }
unicode-normalization = "0.1"
precis-profiles = "0.1.13"
web-time = "1"
futures-util = { version = "0.3", default-features = false, features = ["std"] }
tokio = { version = "1", features = ["rt"] }
tracing = "0.1"
blake3 = "1"
fastcdc = "3"
xxhash-rust = { version = "0.8", features = ["xxh3"] }
base64 = "0.22"
bytes = "1"
zip = { version = "8", default-features = false, features = ["deflate-flate2-zlib-rs"] }

[dev-dependencies]
criterion = { package = "codspeed-criterion-compat", version = "*" }
iref = "4.0.0"
lix_rocksdb_storage = { workspace = true }
lix_slatedb_storage = { workspace = true }
lix_sqlite_storage = { workspace = true }
object_store = { version = "0.14", default-features = false }
paste = "1"
rustc-hash = "2"
rusqlite = { version = "0.32", features = ["bundled"] }
tempfile = "3"
tokio = { version = "1", features = ["rt", "macros", "sync", "time"] }

[target.'cfg(not(target_family = "wasm"))'.dependencies]
zstd = "0.13"

[target.'cfg(target_family = "wasm")'.dependencies]
ruzstd = { version = "0.8", default-features = false, features = ["std"] }
